              background-color: hsl(0, 100%, 31%);
          }
          .mt-content-container::before {
              content: none;
          }
          section::before {
              content: "";
              display: block;
              height: 4rem;
              /* pretend that the header is at least 8rem high so this header cannot fit near the end of page */
              margin-bottom: -4rem;
              /* however, reduce the margin the same amount so that the following content can stay in its usual place */
              page-break-inside: avoid;
              break-inside: avoid;
          }

          /* AutoAttribution */
          .mt-content-container .autoattribution p {
              font-size: 90% !important;
          }
          #librelens-attribution-list li {
              font-size: 90% !important;
          }
      }
  </style>
  <style>
    @page {
      size: letter;
      margin: 0.75in 0.625in 0.9in;
      @top-left {
        content: element(header);
      }
      @bottom-center {
        content: flow(footer);
      }
    }
    * {
      font-family: "Libre Baskerville", prince-no-fallback;
    }
    figure {
      display: flex;
      align-items: center;
      flex-direction: column;
      margin: 0;
      margin-bottom: 0px;
      page-break-inside: avoid;
      margin-bottom: 0.3em !important;
    }
    figcaption {
      caption-side: bottom;
      text-align: center;
      font-size: 90%;
      margin-left: 5%;
      margin-right: 5%;
      margin-top: 0.5em;
      break-inside: avoid-page;
    }
    #libreHeader {
      position: running(header);
    }
    #libreHeader img {
      height: 25px;
      margin: 0;
      padding: 0;
    }
    #libreHeader a {
      margin: 0;
      padding: 0;
    }
    #libreFooter {
        -prince-flow: static(footer, start);
        display: flex;
        width: 100vw;
        height: 20px;
        margin: 0 4%;
        border-radius: 10px;
        font-size: 7px;
        justify-content: center;
        background-color: #127BC4;
    }
    #libreFooter a {
        display: block;
        text-decoration: none;
        color: white;
    }
    .footer-left {
        display: inline-flex;
        flex: 1;
        align-items: center;
        justify-content: space-between;
        color: #F5F5F5;
        padding: 1%;
    }
    .footer-left img {
        vertical-align: middle;
        height: 15px;
        display: inline-block;
        padding-right: 1px;
    }
    .footer-center {
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .footer-pagenum {
        background-color: white;
        border: 1px solid #127BC4;
        color: #127BC4;
        padding: 2px;
        border-radius: 10px;
        min-width: 10px;
        text-align: center;
        font-size: 8px;
    }
    .footer-right {
        display: inline-flex;
        flex: 1;
        align-items: center;
        justify-content: flex-end;
        color: #F5F5F5;
        padding: 1%;
    }
    .date, .pageNumber {
        display: inline-block;
    }
    #pageNumber {
        display: inline-block;
        content: "5.2." counter(page);
    }
  </style>
</head>
